baseURL = "https://91chang.cc/"
languageCode = "en-us"
title = "91Chang - GitHub Tutorial & Developer Resources"
theme = "PaperMod"
defaultContentLanguage = "zh"
hasCJKLanguage = true
paginate = 10

[params]
  author = "91Chang"
  description = "GitHub tutorials, developer tools, and weekly site recommendations"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  disableThemeToggle = false
  defaultTheme = "auto"

  [params.profileMode]
    enabled = true
    title = "91Chang"
    subtitle = "GitHub Tutorials · Developer Tools · Weekly Sites"
    imageUrl = "images/avatar.jpg"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "91Chang"

    [[params.profileMode.buttons]]
      name = "Tutorials"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "Dev Tools"
      url = "/tags/developer-tools/"

    [[params.profileMode.buttons]]
      name = "Cool Sites"
      url = "/tags/cool-sites/"

  [params.socialIcons]
    [[params.socialIcons]]
      name = "github"
      url = "https://github.com/daddychang4ever"
    [[params.socialIcons]]
      name = "rss"
      url = "/index.xml"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Tutorials"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Dev Tools"
    url = "/tags/developer-tools/"
    weight = 3
  [[menu.main]]
    name = "Cool Sites"
    url = "/tags/cool-sites/"
    weight = 4

[taxonomies]
  tag = "tags"
  category = "categories"