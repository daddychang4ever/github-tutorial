    title = "91Chang"
    subtitle = "🚀 GitHub 教程 · 🛠 开发工具 · 🌐 每周趣站"
    imageUrl = "images/avatar.png"
    imageWidth = 120
    imageHeight = 120
    imageTitle = "91Chang"

    [[params.profileMode.buttons]]
      name = "📚 教程"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "🛠 开发工具"
      url = "/tags/开发工具/"

    [[params.profileMode.buttons]]
      name = "🌐 趣站推荐"
      url = "/tags/趣站推荐/"

  [params.homeInfoParams]
    Title = "GitHub 新手教程"
