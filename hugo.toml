baseURL = "https://91chang.cc/"
languageCode = "en-us"
title = "91Chang - GitHub 教程 & 开发者资源"
theme = "PaperMod"
defaultContentLanguage = "zh"
hasCJKLanguage = true
paginate = 10

[params]
  mode = "profile"
  author = "91Chang"
  description = "GitHub 新手教程、开发者工具推荐、每周趣站分享，中英双语内容"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  disableThemeToggle = false
